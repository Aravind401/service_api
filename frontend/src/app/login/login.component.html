<div class="layout">
  <div class="card form-card">
    <h2>Employee Login</h2>
    <p>Admin must provide salary; normal user salary is hidden.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>User Type</label>
      <select formControlName="userType" (change)="onUserTypeChange()">
        <option value="user">Normal User</option>
        <option value="admin">Admin</option>
      </select>

      <label>Employee Name</label>
      <input formControlName="employeeName" type="text" />

      <label>Age</label>
      <input formControlName="age" type="number" />

      <label>Date of Birth</label>
      <input formControlName="dob" type="date" />

      <label>Email</label>
      <input formControlName="email" type="email" />

      <ng-container *ngIf="form.value.userType === 'admin'">
        <label>Salary</label>
        <input formControlName="salary" type="number" />
      </ng-container>

      <button class="btn-primary" type="submit">Login & Save</button>
      <div class="error" *ngIf="error">{{ error }}</div>
    </form>
  </div>
</div>
