<div class="dashboard">
  <div class="card">
    <div class="top">
      <h2>Dashboard</h2>
      <div class="search-wrap">
        <input [(ngModel)]="search" placeholder="Search by name/email/type/code" />
        <button class="btn-primary" (click)="fetch()">Search</button>
      </div>
    </div>

    <div class="grid-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Age</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Salary</th>
            <th>Code</th>
            <th>Certificate</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of employees">
            <td>{{ e.employeeName }}</td>
            <td>{{ e.userType }}</td>
            <td>{{ e.age }}</td>
            <td>{{ e.dob }}</td>
            <td>{{ e.email }}</td>
            <td>{{ e.salary ?? '-' }}</td>
            <td>{{ e.certificateCode }}</td>
            <td class="actions">
              <button (click)="exportExcel(e.id)">Excel</button>
              <button (click)="exportPdf(e.id)">PDF</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
